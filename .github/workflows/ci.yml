name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  # Prove the scaffolded code of representative npm stacks actually installs and builds.
  scaffold-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack: [node-ts, cli-ts, mcp-server, express, react-spa]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Scaffold a ${{ matrix.stack }} project
        run: node dist/index.js quick out-${{ matrix.stack }} --stack ${{ matrix.stack }} --no-git --no-install
      - name: Install + build + test the generated project
        working-directory: out-${{ matrix.stack }}
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm test
